<div class="form">
  <form (submit)="login($event)" role="form" class="loginForm">
    <div class="form-group">
      <input
        type="email"
        class="form-control"
        name="email"
        id="email"
        [(ngModel)]="email"
        placeholder="Seu Email"
        required
      />
    </div>

    <div class="form-group">
      <div class="form-control" style="border-radius: 5px; border: transparent; display: flex; align-items: center;">
        <input
          [type]="senhaVisivel ? 'text' : 'password'"
          style="border-color: transparent; width: 100%;"
          name="senha"
          id="senha"
          [(ngModel)]="senha"
          placeholder="Sua Senha"
          required
        />
        <button type="button" (click)="mostraSenha()" style="border: 0; background: transparent;">
          <i class="fa fa-eye" aria-hidden="true"></i>
        </button>
      </div>
    </div>

    <div *ngIf="erroLogin" class="text-danger mb-2">{{ erroLogin }}</div>

    <button type="submit" [disabled]="enviando" class="btn-get-started">
      {{ enviando ? 'Entrando...' : 'Entrar' }}
    </button>
  </form>
</div>
