<div class="crud-page">
  <div class="row crud-toolbar align-items-center">
    <div class="col-md-6">
      <h2 class="crud-title">Lista de Propriedades</h2>
    </div>
    <div class="col-md-6 d-flex justify-content-md-end">
      <button type="button" (click)="adicionarPropriedade()" class="crud-primary-btn">
        Nova Propriedade
      </button>
    </div>
  </div>

  <div class="crud-table-wrap table-responsive">
    <table class="table table-striped table-hover align-middle">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Localização</th>
          <th>Qtd. Animais</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let property of properties">
          <td>{{ property.nomePropriedade || '-' }}</td>
          <td>{{ property.localidade || '-' }}</td>
          <td>{{ property.quantidadeAnimais }}</td>
          <td class="crud-actions">
            <button type="button" (click)="editarPropriedade(property)" class="crud-action-btn" title="Editar">
              Editar
            </button>
            <button type="button" (click)="deleteProperty(property.id)" class="crud-action-btn delete" title="Excluir">
              Excluir
            </button>
          </td>
        </tr>
      </tbody>
      <tfoot *ngIf="properties.length === 0">
        <tr>
          <td colspan="4" class="text-center">Nenhuma propriedade encontrada.</td>
        </tr>
      </tfoot>
    </table>
  </div>

  <div class="d-flex justify-content-between align-items-center" *ngIf="totalPages > 0">
    <button class="btn btn-outline-secondary" type="button" (click)="previousPage()" [disabled]="page === 0 || loading">
      Anterior
    </button>
    <span>Pagina {{ page + 1 }} de {{ totalPages }}</span>
    <button
      class="btn btn-outline-secondary"
      type="button"
      (click)="nextPage()"
      [disabled]="page + 1 >= totalPages || loading"
    >
      Proxima
    </button>
  </div>
</div>
