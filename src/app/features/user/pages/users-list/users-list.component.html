<div class="crud-page">
  <div class="row crud-toolbar align-items-center">
    <div class="col-md-4">
      <h2 class="crud-title">Lista de Usuarios</h2>
    </div>
    <div class="col-md-4">
      <input
        type="text"
        class="form-control"
        placeholder="Pesquisar por nome ou email..."
        [formControl]="searchControl"
      />
    </div>
    <div class="col-md-4 d-flex justify-content-md-end mt-2 mt-md-0">
      <button type="button" (click)="adicionarUsuario()" class="crud-primary-btn">
        Novo Usuario
      </button>
    </div>
  </div>

  <div *ngIf="successMessage" class="alert alert-success py-2">{{ successMessage }}</div>
  <div *ngIf="errorMessage" class="alert alert-danger py-2">{{ errorMessage }}</div>
  <div *ngIf="loading" class="alert alert-info py-2">Carregando usuarios...</div>

  <div class="crud-table-wrap table-responsive" *ngIf="!loading">
    <table class="table table-striped table-hover align-middle">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Email</th>
          <th>Acoes</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of filteredUsers">
          <td>{{ user.nome }}</td>
          <td>{{ user.email }}</td>
          <td class="crud-actions">
            <button type="button" (click)="editarUsuario(user)" class="crud-action-btn" title="Editar">
              Editar
            </button>
            <button type="button" (click)="deleteUser(user.idusu)" class="crud-action-btn delete" title="Excluir">
              Excluir
            </button>
          </td>
        </tr>
      </tbody>
      <tfoot *ngIf="filteredUsers.length === 0">
        <tr>
          <td colspan="3" class="text-center">Nenhum usuario encontrado.</td>
        </tr>
      </tfoot>
    </table>
  </div>

  <div class="d-flex justify-content-between align-items-center mt-3" *ngIf="!loading && totalPages > 0">
    <button class="btn btn-outline-secondary" type="button" (click)="previousPage()" [disabled]="page === 0">
      Anterior
    </button>
    <span>Pagina {{ page + 1 }} de {{ totalPages }}</span>
    <button
      class="btn btn-outline-secondary"
      type="button"
      (click)="nextPage()"
      [disabled]="page + 1 >= totalPages"
    >
      Proxima
    </button>
  </div>
</div>
